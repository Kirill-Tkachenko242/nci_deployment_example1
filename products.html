<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AdventureGear Co. - Products</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/bootstrap-5.3.8-dist/css/bootstrap.min.css">
    <script src="/js/products.js" defer></script>
    <script src="css/bootstrap-5.3.8-dist/js/bootstrap.bundle.min.js" defer></script>
</head>
<body class="products-page">
    <div class="container py-5">
        <h1 class="text-center mb-5" style="color: #2c6e2c;">AdventureGear Catalog</h1>
        <!-- Dropdown meny with categories -->
        <div class="dropdown mb-3" id="myDropdown">
            <button class="btn btn-success btn-secondary dropdown-toggle fw-medium rounded-pill px-4 py-2" type="button" data-bs-toggle="dropdown" aria-expanded="false">
                Categories
            </button>
            <ul class="dropdown-menu shadow border-success border-1 rounded-3 mt-1">
                <li><a class="All text-success" href="#">All categories</a></li>
                <li><a class="Tent text-success" href="#">Tent</a></li>
                <li><a class="Footwear text-success" href="#">Footwear</a></li>
                <li><a class="Gear text-success" href="#">Gear</a></li>
                <li><a class="Camping text-success" href="#">Camping</a></li>
            </ul>
        </div>
        <div class="row" id="product-list">
            <!-- Products will be added here with JS -->
            <!-- Pictures were taken from this web site https://www.pexels.com/ --> 
        </div>
    </div>
    <!-- Footer -->
    <footer class="products-footer">
        <a href="contacts.html" class="products-footer-a">Contacts</a>
        <a href="index.html" class="products-footer-a">Main Page</a>
    </footer>
</body>
</html>
