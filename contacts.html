<!DOCTYPE html>
<html lang="eng">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title> AdventureGear Co. - Contacts </title>
        <link rel="stylesheet" href="css/style.css">
        <link rel="stylesheet" href="css/bootstrap-5.3.8-dist/css/bootstrap.min.css">
    </head>
    <body class="body-form">
        <!-- Hello -->
        <h1 class="text-center mb-3 mt-2" style="color: #2c6e2c;">Let's stay in touch!</h1>
        <!-- Container -->
        <div class="contacts-container my-2 mx-4"> 
            <!-- Form with all inputs -->
            <form id = "contactForm" class="row g-3" novalidate>
            <div class="col-md-6">
                <label for="validationDefault01" class="form-label">Full name*</label>
                <input type="text" class="form-control" id="name" value="Kirill Tkachenko" required>
            </div>

            <div class="mb-3">
                <label for="exampleInputEmail1" class="form-label">Email address*</label>
                <input type="email" class="form-control" id="email" aria-describedby="emailHelp" value = "example@gmail.com">
                <div id="emailHelp" class="form-text">We'll never share your email with anyone else.</div>
            </div>

            <div class="col-md-6">
                <label class="form-label">Phone*</label>
                <input type="tel" class="form-control" id="phone" value = "+353*********" required>
            </div>

            <div class="col-md-6">
                <label class="form-label">Query Type*</label>
                <select class="form-select" id="queryType" required>
                    <option value="">Choose...</option>
                    <option value="Booking">Booking</option>
                    <option value="Payment">Payment</option>
                    <option value="General Info">General Info</option>
                    <option value="Other">Other</option>
                </select>
            </div>

            <div class="mb-3">
                <label for="validationTextarea" class="form-label">Textarea*</label>
                <textarea rows="5" class="form-control" id="validationTextarea" placeholder="Required example textarea" required></textarea>
                <div class="invalid-feedback">
                Please enter a message in the textarea.
                </div>
            </div>

            <div class="mb-3">
                <label class="form-label">Add file</label>
                <input type="file" class="form-control" aria-label="file example">
                <div class="invalid-feedback">Example invalid form file feedback</div>
            </div>
            <div class="col-12">
                <div class="form-check">
                <input class="form-check-input" type="checkbox" value="" id="invalidCheck" required>
                <label class="form-check-label" for="invalidCheck2">
                    Agree to terms and conditions*
                </label>
                </div>
            </div>
            <div class="mb-3">
                <button class="btn btn-primary" type="submit" >Submit form</button>
            </div>
            <div id="formMessage" class="mt-3"></div>
            </form>
        </div>
        <!-- Footer -->
        <footer class="products-footer">
            <a href="products.html" class="products-footer-a">Products Page</a>
            <a href="index.html" class="products-footer-a">Main Page</a>
        </footer>
        <script src="js/script.js"></script>
    </body>
</html>

-->
